<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <h2>Forgot Password</h2>
    <form id="forgotForm">
      <div class="form-group">
        <label>Enter your email</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn">Send Reset Link</button>
    </form>
    <p class="message" id="msg"></p>
    <div class="links">
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;

      try {
        const res = await fetch('/api/auth/forget-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        msg.textContent = data.message;
        msg.className = res.ok ? 'message success' : 'message error';

        // For development only: shows the reset link directly on screen.
        // In production this would be emailed instead.
        if (res.ok && data.resetLink) {
          const linkEl = document.createElement('a');
          linkEl.href = data.resetLink;
          linkEl.textContent = 'Click here to reset password';
          linkEl.style.display = 'block';
          linkEl.style.textAlign = 'center';
          linkEl.style.marginTop = '10px';
          msg.after(linkEl);
        }
      } catch (err) {
        msg.textContent = 'Server error. Is the server running?';
        msg.className = 'message error';
      }
    });
  </script>
</body>
</html>
